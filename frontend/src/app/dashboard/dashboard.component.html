<div class="app-container">
  <!-- Top Navigation Header -->
  <header class="navbar">
    <div class="nav-brand">
      <span>🎓</span> CampusRecruit
    </div>
    
    <div class="nav-user">
      <span class="role-badge" [ngClass]="{
        'badge-admin': currentUser?.role === 'ADMIN',
        'badge-company': currentUser?.role === 'COMPANY',
        'badge-student': currentUser?.role === 'STUDENT'
      }">
        {{ currentUser?.role }} : {{ currentUser?.username }}
      </span>

      <div class="nav-actions">
        <!-- Notification Bell -->
        <button class="notif-bell" (click)="toggleNotifDropdown()">
          🔔
          <span *ngIf="unreadCount > 0" class="notif-count">{{ unreadCount }}</span>
        </button>

        <!-- Logout -->
        <button class="btn btn-demo" (click)="logout()" style="padding: 0.5rem 1rem; font-size: 0.85rem; background: rgba(239, 68, 68, 0.15); border-color: var(--danger); color: #fff;">
          🚪 Log Out
        </button>
      </div>
    </div>
  </header>

  <!-- Notification Dropdown Menu -->
  <div *ngIf="showNotifDropdown" class="glass-card notif-dropdown">
    <div class="notif-header">
      🔔 Recent Notification Alerts
    </div>
    <div *ngIf="!notifications.length" class="text-center py-3 text-muted" style="font-size: 0.8rem;">
      No notifications yet.
    </div>
    <div 
      *ngFor="let notif of notifications" 
      class="notif-item" 
      [ngClass]="{ 'unread': !notif.isRead }"
      (click)="markAsRead(notif)"
    >
      <div class="notif-msg">{{ notif.message }}</div>
      <div class="notif-time">{{ notif.createdAt | date:'short' }}</div>
    </div>
  </div>

  <!-- Dashboard Main Workspace -->
  <main class="main-content">
    <div class="dashboard-header">
      <h2>Welcome Back, {{ currentUser?.username }}</h2>
      <p>Management console for university recruitment activity</p>
    </div>

    <!-- Role Based Child Views -->
    <div [ngSwitch]="currentUser?.role">
      <app-admin-dashboard *ngSwitchCase="'ADMIN'"></app-admin-dashboard>
      <app-company-dashboard *ngSwitchCase="'COMPANY'"></app-company-dashboard>
      <app-student-dashboard *ngSwitchCase="'STUDENT'"></app-student-dashboard>
    </div>
  </main>
</div>
