services:
  - type: web
    name: campus-recruiting-portal
    env: docker
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: recruitment-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: recruitment-db
          property: password
      - key: DATABASE_HOST
        fromDatabase:
          name: recruitment-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: recruitment-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: recruitment-db
          property: database
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect

databases:
  - name: recruitment-db
    plan: free
