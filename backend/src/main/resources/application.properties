spring.application.name=recruitment
server.port=8080

# Database configurations - Fallback to H2 local database, override with Postgres on Render
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:recruitmentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Seed data initialization (defer until Hibernate finishes DDL generation)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Enable H2 Console locally
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Allow serving index.html as fallback for Angular routing
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
